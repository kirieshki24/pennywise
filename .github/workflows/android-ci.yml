name: Android CI (Unit + Firebase Test Lab + APK artifact)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test_build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4


      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        working-directory: src
        run: chmod +x ./gradlew

      # 1) Unit tests
      - name: Run unit tests (Debug)
        working-directory: src
        run: ./gradlew testDebugUnitTest --stacktrace

      # 2) Build APKs for Firebase Test Lab instrumentation
      - name: Assemble Debug APK + androidTest APK
        working-directory: src
        run: ./gradlew :app:assembleDebug :app:assembleDebugAndroidTest --stacktrace

      # 3) Auth to Google Cloud (Firebase Test Lab)
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}


      # 4) UI tests in Firebase Test Lab
      - name: Run UI tests on Firebase Test Lab
        working-directory: src
        run: |
          gcloud firebase test android run \
            --type instrumentation \
            --app app/build/outputs/apk/debug/app-debug.apk \
            --test app/build/outputs/apk/androidTest/debug/app-debug-androidTest.apk \
            --device model=Pixel2,version=30,locale=en,orientation=portrait \
            --timeout 15m

      # 5) Upload APK artifact after successful tests
      - name: Upload APK artifact (app-debug.apk)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: pennywise-app-debug-apk
          path: src/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
